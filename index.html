<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Brand & Group Submission</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --ink: #0f0e17; --paper: #fffcf5; --accent: #e8572a; --accent2: #f5a623;
    --muted: #7a7880; --border: #e2ddd6; --card: #ffffff; --radius: 12px;
  }
  body { font-family:'DM Sans',sans-serif; background:var(--paper); color:var(--ink); min-height:100vh; padding:40px 20px 60px; }
  .page-wrap { max-width:720px; margin:0 auto; }

  .header { margin-bottom:32px; padding-bottom:24px; border-bottom:2px solid var(--ink); }
  .header-tag { font-family:'Syne',sans-serif; font-size:11px; font-weight:700; letter-spacing:.18em; text-transform:uppercase; color:var(--accent); margin-bottom:10px; display:flex; align-items:center; gap:8px; }
  .header-tag::before { content:''; display:inline-block; width:20px; height:2px; background:var(--accent); }
  h1 { font-family:'Syne',sans-serif; font-size:clamp(26px,5vw,40px); font-weight:800; line-height:1.1; }
  h1 span { color:var(--accent); }
  .subtitle { margin-top:10px; font-size:15px; color:var(--muted); font-weight:300; line-height:1.6; }

  .tabs { display:flex; gap:4px; margin-bottom:24px; background:#f0ede8; border-radius:10px; padding:4px; }
  .tab { flex:1; padding:10px; text-align:center; font-family:'Syne',sans-serif; font-size:13px; font-weight:700; letter-spacing:.06em; text-transform:uppercase; border:none; background:none; border-radius:7px; cursor:pointer; color:var(--muted); transition:all .18s; }
  .tab.active { background:white; color:var(--ink); box-shadow:0 1px 6px rgba(0,0,0,.1); }

  .card { background:var(--card); border:1.5px solid var(--border); border-radius:var(--radius); padding:28px 32px; margin-bottom:16px; box-shadow:0 2px 12px rgba(15,14,23,.05); }
  .card-title { font-family:'Syne',sans-serif; font-size:12px; font-weight:700; letter-spacing:.14em; text-transform:uppercase; color:var(--muted); margin-bottom:20px; display:flex; align-items:center; gap:10px; }
  .card-title .dot { width:8px; height:8px; border-radius:50%; background:var(--accent); flex-shrink:0; }

  .field { margin-bottom:20px; }
  .field:last-of-type { margin-bottom:0; }
  label { display:block; font-size:13px; font-weight:500; margin-bottom:7px; }
  label .req { color:var(--accent); margin-left:3px; }
  input[type="text"] { width:100%; padding:11px 15px; border:1.5px solid var(--border); border-radius:8px; font-family:'DM Sans',sans-serif; font-size:15px; color:var(--ink); background:var(--paper); transition:border-color .2s,box-shadow .2s; outline:none; }
  input[type="text"]:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(232,87,42,.12); }
  input::placeholder { color:#bbb8b2; }
  input.invalid { border-color:var(--accent)!important; }
  .error-msg { font-size:12px; color:var(--accent); margin-top:5px; display:none; }

  .members-list { display:flex; flex-direction:column; gap:10px; }
  .member-row { display:grid; grid-template-columns:1fr 140px 36px; gap:10px; align-items:start; animation:slideIn .2s ease; }
  @keyframes slideIn { from{opacity:0;transform:translateY(-6px)} to{opacity:1;transform:translateY(0)} }
  .member-label { grid-column:1/-1; font-size:11px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--accent2); margin-bottom:-4px; }
  .remove-btn { width:36px; height:38px; border:1.5px solid var(--border); border-radius:8px; background:none; cursor:pointer; color:var(--muted); font-size:18px; display:flex; align-items:center; justify-content:center; transition:all .15s; flex-shrink:0; }
  .remove-btn:hover { border-color:var(--accent); color:var(--accent); background:rgba(232,87,42,.06); }
  .remove-btn:disabled { opacity:.2; cursor:not-allowed; }
  .add-btn { margin-top:14px; display:flex; align-items:center; justify-content:center; gap:7px; font-family:'DM Sans',sans-serif; font-size:13px; font-weight:500; color:var(--accent); background:rgba(232,87,42,.07); border:1.5px dashed rgba(232,87,42,.4); border-radius:8px; padding:9px 16px; cursor:pointer; transition:all .15s; width:100%; }
  .add-btn:hover { background:rgba(232,87,42,.12); border-color:var(--accent); }

  .submit-btn { width:100%; padding:15px; background:var(--ink); color:white; font-family:'Syne',sans-serif; font-size:14px; font-weight:700; letter-spacing:.06em; text-transform:uppercase; border:none; border-radius:var(--radius); cursor:pointer; transition:all .2s; margin-top:6px; position:relative; overflow:hidden; }
  .submit-btn::after { content:''; position:absolute; inset:0; background:var(--accent); transform:scaleX(0); transform-origin:left; transition:transform .25s ease; z-index:0; }
  .submit-btn:hover::after { transform:scaleX(1); }
  .submit-btn span { position:relative; z-index:1; }
  .submit-btn:disabled { opacity:.6; cursor:not-allowed; }

  .toast { position:fixed; bottom:28px; left:50%; transform:translateX(-50%) translateY(20px); background:var(--ink); color:white; padding:12px 24px; border-radius:50px; font-size:14px; font-weight:500; opacity:0; transition:all .3s; pointer-events:none; z-index:999; white-space:nowrap; }
  .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

  #resultsPanel { display:none; }
  .results-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; flex-wrap:wrap; gap:10px; }
  .results-header h2 { font-family:'Syne',sans-serif; font-size:18px; font-weight:800; }
  .count-badge { background:var(--accent); color:white; font-family:'Syne',sans-serif; font-size:12px; font-weight:700; padding:4px 12px; border-radius:50px; }

  .no-submissions { text-align:center; padding:40px 20px; color:var(--muted); border:1.5px dashed var(--border); border-radius:var(--radius); }
  .no-submissions .big { font-size:36px; margin-bottom:10px; }
  .no-submissions p { font-size:14px; }

  .submission-card { background:var(--card); border:1.5px solid var(--border); border-radius:var(--radius); padding:20px 24px; margin-bottom:12px; box-shadow:0 1px 6px rgba(15,14,23,.04); animation:fadeUp .3s ease; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
  .sc-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; flex-wrap:wrap; gap:8px; }
  .brand-name { font-family:'Syne',sans-serif; font-size:17px; font-weight:800; color:var(--ink); display:flex; align-items:center; gap:8px; }
  .brand-name::before { content:''; display:inline-block; width:10px; height:10px; border-radius:50%; background:var(--accent); flex-shrink:0; }
  .sc-time { font-size:11px; color:var(--muted); }
  .members-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); gap:8px; }
  .member-chip { background:#f7f4ef; border:1px solid var(--border); border-radius:8px; padding:8px 12px; }
  .member-chip .mname { font-size:14px; font-weight:500; color:var(--ink); }
  .member-chip .msid { font-size:11px; color:var(--muted); margin-top:2px; font-family:monospace; }

  .refresh-btn { background:none; border:1.5px solid var(--border); border-radius:8px; padding:7px 14px; font-family:'DM Sans',sans-serif; font-size:13px; color:var(--muted); cursor:pointer; transition:all .15s; display:flex; align-items:center; gap:6px; }
  .refresh-btn:hover { border-color:var(--ink); color:var(--ink); }
  .loading { text-align:center; padding:30px; color:var(--muted); font-size:14px; }

  @media(max-width:500px) {
    .card { padding:18px 16px; }
    .member-row { grid-template-columns:1fr 110px 36px; }
  }
</style>
</head>
<body>
<div class="page-wrap">

  <div class="header">
    <div class="header-tag">Group Assignment</div>
    <h1>Brand & Group <span>Submission</span></h1>
    <p class="subtitle">Submit your brand and group members below. All submissions are visible to the whole class.</p>
  </div>

  <div class="tabs">
    <button class="tab active" id="tabSubmit"  onclick="switchTab('submit')">✏️ &nbsp;Submit</button>
    <button class="tab"        id="tabResults" onclick="switchTab('results')">👥 &nbsp;View All Submissions</button>
  </div>

  <!-- SUBMIT PANEL -->
  <div id="submitPanel">
    <div class="card">
      <div class="card-title"><span class="dot"></span>Brand Details</div>
      <div class="field">
        <label for="brandName">Brand Name <span class="req">*</span></label>
        <input type="text" id="brandName" placeholder="e.g. Aqua Maldives Co." autocomplete="off"/>
        <div class="error-msg" id="brandErr">Please enter your brand name.</div>
      </div>
    </div>

    <div class="card">
      <div class="card-title"><span class="dot"></span>Group Members</div>
      <div class="members-list" id="membersList"></div>
      <button type="button" class="add-btn" onclick="addMember()">＋ Add Another Member</button>
    </div>

    <button class="submit-btn" id="submitBtn" onclick="submitForm()"><span>Submit Group & Brand →</span></button>
  </div>

  <!-- RESULTS PANEL -->
  <div id="resultsPanel">
    <div class="results-header">
      <h2>All Submissions <span class="count-badge" id="countBadge">0</span></h2>
      <button class="refresh-btn" onclick="loadResults()">↻ Refresh</button>
    </div>
    <div id="resultsList"><div class="loading">Loading submissions…</div></div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
  let memberCount = 0;

  function switchTab(tab) {
    document.getElementById('submitPanel').style.display  = tab==='submit'  ? 'block':'none';
    document.getElementById('resultsPanel').style.display = tab==='results' ? 'block':'none';
    document.getElementById('tabSubmit').classList.toggle('active',  tab==='submit');
    document.getElementById('tabResults').classList.toggle('active', tab==='results');
    if (tab==='results') loadResults();
  }

  function addMember() {
    memberCount++;
    const list = document.getElementById('membersList');
    const row = document.createElement('div');
    row.className = 'member-row';
    row.id = 'member-' + memberCount;
    row.innerHTML = `
      <div class="member-label">Member ${memberCount}</div>
      <input type="text" placeholder="Full name"  id="name-${memberCount}" style="grid-column:1/2"/>
      <input type="text" placeholder="Student ID" id="sid-${memberCount}"  style="grid-column:2/3"/>
      <button class="remove-btn" onclick="removeMember(${memberCount})" title="Remove">×</button>
    `;
    list.appendChild(row);
    updateRemoveButtons();
    document.getElementById('name-' + memberCount).focus();
  }

  function removeMember(id) {
    const el = document.getElementById('member-' + id);
    if (el) el.remove();
    renumberMembers();
    updateRemoveButtons();
  }

  function renumberMembers() {
    document.querySelectorAll('.member-row').forEach((r,i) => {
      const l = r.querySelector('.member-label');
      if (l) l.textContent = 'Member ' + (i+1);
    });
  }

  function updateRemoveButtons() {
    const btns = document.querySelectorAll('.remove-btn');
    btns.forEach(b => b.disabled = btns.length <= 1);
  }

  async function submitForm() {
    let valid = true;
    const brand = document.getElementById('brandName').value.trim();
    const brandErr = document.getElementById('brandErr');
    if (!brand) {
      document.getElementById('brandName').classList.add('invalid');
      brandErr.style.display = 'block'; valid = false;
    } else {
      document.getElementById('brandName').classList.remove('invalid');
      brandErr.style.display = 'none';
    }

    const rows = document.querySelectorAll('.member-row');
    if (!rows.length) { alert('Please add at least one group member.'); return; }

    let members = [];
    rows.forEach(row => {
      const ni = row.querySelector('input[id^="name-"]');
      const si = row.querySelector('input[id^="sid-"]');
      const name = ni ? ni.value.trim() : '';
      const sid  = si ? si.value.trim() : '';
      if (!name) { ni && ni.classList.add('invalid'); valid = false; }
      else          ni && ni.classList.remove('invalid');
      if (!sid)  { si && si.classList.add('invalid');  valid = false; }
      else          si && si.classList.remove('invalid');
      if (name && sid) members.push({ name, sid });
    });

    if (!valid) { alert('Please fill in all highlighted fields.'); return; }

    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.querySelector('span').textContent = 'Saving…';

    try {
      const existing = await safeGet('class_submissions');
      const list = existing ? JSON.parse(existing) : [];
      list.push({ brand, members, time: new Date().toISOString() });
      await window.storage.set('class_submissions', JSON.stringify(list), true);
      showToast('✅ Submitted! Click "View All Submissions" to see everyone\'s.');
      document.getElementById('brandName').value = '';
      document.getElementById('membersList').innerHTML = '';
      memberCount = 0;
      addMember();
    } catch(e) {
      showToast('⚠️ Could not save. Please try again.');
      console.error(e);
    } finally {
      btn.disabled = false;
      btn.querySelector('span').textContent = 'Submit Group & Brand →';
    }
  }

  async function loadResults() {
    const container = document.getElementById('resultsList');
    container.innerHTML = '<div class="loading">Loading…</div>';
    try {
      const raw = await safeGet('class_submissions');
      const list = raw ? JSON.parse(raw) : [];
      document.getElementById('countBadge').textContent = list.length;
      if (!list.length) {
        container.innerHTML = `<div class="no-submissions"><div class="big">📭</div><p>No submissions yet. Be the first to submit!</p></div>`;
        return;
      }
      container.innerHTML = [...list].reverse().map(s => `
        <div class="submission-card">
          <div class="sc-header">
            <div class="brand-name">${escHtml(s.brand)}</div>
            <div class="sc-time">${formatTime(s.time)}</div>
          </div>
          <div class="members-grid">
            ${s.members.map(m => `
              <div class="member-chip">
                <div class="mname">${escHtml(m.name)}</div>
                <div class="msid">${escHtml(m.sid)}</div>
              </div>`).join('')}
          </div>
        </div>`).join('');
    } catch(e) {
      container.innerHTML = '<div class="loading">Could not load submissions.</div>';
    }
  }

  async function safeGet(key) {
    try {
      const r = await window.storage.get(key, true);
      return r ? r.value : null;
    } catch { return null; }
  }

  function formatTime(iso) {
    try {
      return new Date(iso).toLocaleString(undefined, { month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' });
    } catch { return iso; }
  }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3800);
  }

  addMember();
</script>
</body>
</html>
