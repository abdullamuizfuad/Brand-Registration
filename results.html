<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Class Results — Brand Registration</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --ink: #0f0e17; --paper: #fffcf5; --accent: #e8572a; --accent2: #f5a623;
    --muted: #7a7880; --border: #e2ddd6; --card: #ffffff; --radius: 12px;
  }
  body { font-family:'DM Sans',sans-serif; background:var(--paper); color:var(--ink); min-height:100vh; padding:40px 20px 60px; }
  .page-wrap { max-width:800px; margin:0 auto; }

  .header { margin-bottom:32px; padding-bottom:24px; border-bottom:2px solid var(--ink); }
  .header-tag { font-family:'Syne',sans-serif; font-size:11px; font-weight:700; letter-spacing:.18em; text-transform:uppercase; color:var(--accent); margin-bottom:10px; display:flex; align-items:center; gap:8px; }
  .header-tag::before { content:''; display:inline-block; width:20px; height:2px; background:var(--accent); }
  h1 { font-family:'Syne',sans-serif; font-size:clamp(26px,5vw,40px); font-weight:800; line-height:1.1; }
  h1 span { color:var(--accent); }
  .subtitle { margin-top:10px; font-size:15px; color:var(--muted); font-weight:300; line-height:1.6; }

  .toolbar { display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; flex-wrap:wrap; gap:12px; }
  .count-info { font-family:'Syne',sans-serif; font-size:14px; font-weight:700; }
  .count-badge { background:var(--accent); color:white; font-size:12px; padding:3px 12px; border-radius:50px; margin-left:8px; }

  .btn { display:inline-flex; align-items:center; gap:6px; padding:9px 18px; border-radius:8px; font-family:'DM Sans',sans-serif; font-size:13px; font-weight:500; cursor:pointer; transition:all .15s; border:1.5px solid var(--border); background:white; color:var(--ink); text-decoration:none; }
  .btn:hover { border-color:var(--ink); }
  .btn.primary { background:var(--ink); color:white; border-color:var(--ink); }
  .btn.primary:hover { background:var(--accent); border-color:var(--accent); }

  .search-bar { width:100%; padding:11px 16px; border:1.5px solid var(--border); border-radius:8px; font-family:'DM Sans',sans-serif; font-size:14px; color:var(--ink); background:white; outline:none; margin-bottom:20px; transition:border-color .2s; }
  .search-bar:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(232,87,42,.1); }

  .submission-card { background:var(--card); border:1.5px solid var(--border); border-radius:var(--radius); padding:20px 24px; margin-bottom:12px; box-shadow:0 1px 6px rgba(15,14,23,.04); animation:fadeUp .3s ease; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }

  .sc-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; flex-wrap:wrap; gap:8px; }
  .brand-name { font-family:'Syne',sans-serif; font-size:18px; font-weight:800; color:var(--ink); display:flex; align-items:center; gap:10px; }
  .brand-dot { width:10px; height:10px; border-radius:50%; background:var(--accent); flex-shrink:0; }
  .sc-time { font-size:11px; color:var(--muted); background:#f0ede8; padding:3px 10px; border-radius:50px; }
  .group-num { font-size:11px; font-weight:700; color:white; background:var(--accent2); padding:3px 10px; border-radius:50px; font-family:'Syne',sans-serif; letter-spacing:.05em; }

  .members-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(160px,1fr)); gap:8px; }
  .member-chip { background:#f7f4ef; border:1px solid var(--border); border-radius:8px; padding:8px 12px; }
  .member-chip .mname { font-size:13px; font-weight:500; color:var(--ink); }
  .member-chip .msid { font-size:11px; color:var(--muted); margin-top:2px; font-family:monospace; letter-spacing:.03em; }

  .empty-state { text-align:center; padding:60px 20px; color:var(--muted); border:1.5px dashed var(--border); border-radius:var(--radius); }
  .empty-state .big { font-size:40px; margin-bottom:12px; }
  .empty-state p { font-size:14px; line-height:1.7; }

  .loading { text-align:center; padding:40px; color:var(--muted); }
  .spinner { width:32px; height:32px; border:3px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin .7s linear infinite; margin:0 auto 12px; }
  @keyframes spin { to{transform:rotate(360deg)} }

  .error-state { text-align:center; padding:40px 20px; background:#fff5f3; border:1.5px solid #f5c6bb; border-radius:var(--radius); color:#c0392b; }
  .error-state .big { font-size:36px; margin-bottom:10px; }

  .back-link { display:inline-flex; align-items:center; gap:6px; color:var(--muted); font-size:13px; text-decoration:none; margin-bottom:24px; transition:color .15s; }
  .back-link:hover { color:var(--accent); }

  @media(max-width:500px) {
    .members-grid { grid-template-columns:1fr 1fr; }
    .submission-card { padding:16px; }
  }
</style>
</head>
<body>
<div class="page-wrap">

  <a class="back-link" href="index.html">← Back to Registration Form</a>

  <div class="header">
    <div class="header-tag">MKT309 — Brand Management</div>
    <h1>Class <span>Submissions</span></h1>
    <p class="subtitle">All registered brands and group members. Data refreshes automatically from the class sheet.</p>
  </div>

  <div class="toolbar">
    <div class="count-info">
      Groups Registered <span class="count-badge" id="countBadge">—</span>
    </div>
    <div style="display:flex;gap:8px;">
      <button class="btn" onclick="loadData()">↻ Refresh</button>
      <a class="btn primary" href="index.html">+ Register My Group</a>
    </div>
  </div>

  <input class="search-bar" type="text" id="searchBar" placeholder="🔍  Search by brand name or student name…" oninput="filterResults()"/>

  <div id="resultsList">
    <div class="loading">
      <div class="spinner"></div>
      Loading submissions…
    </div>
  </div>

</div>

<script>
  // ── CONFIG ──────────────────────────────────────────────────────────────
  // Your Google Sheet published as CSV
  // Sheet ID: 1GBiV4XIRFbPzuWbpiriRQV3UHfqtXJi_zsmhrUAe8qk
  
  const SHEET_URL = `https://docs.google.com/spreadsheets/d/e/2PACX-1vRr8xijeCu8_nbWPVno40xWMwUizYjP50e5tvobxxDklFoKXLGfzjOfWoUbvGS27hL_P4OoYivBKHVf/pub?output=csv`;
  // ────────────────────────────────────────────────────────────────────────

  let allData = [];

  async function loadData() {
    document.getElementById('resultsList').innerHTML = `
      <div class="loading"><div class="spinner"></div>Loading submissions…</div>`;
    document.getElementById('countBadge').textContent = '—';

    try {
      const res = await fetch(SHEET_URL + '&t=' + Date.now());
      if (!res.ok) throw new Error('Failed to fetch');
      const csv = await res.text();
      allData = parseCSV(csv);
      renderResults(allData);
    } catch(e) {
      document.getElementById('resultsList').innerHTML = `
        <div class="error-state">
          <div class="big">⚠️</div>
          <p><strong>Could not load results.</strong><br/>
          Make sure the Google Sheet is shared as "Anyone with the link can view".<br/>
          <button class="btn" style="margin-top:14px" onclick="loadData()">Try Again</button></p>
        </div>`;
    }
  }

  function parseCSV(csv) {
    const lines = csv.trim().split('\n');
    if (lines.length < 2) return [];
    // Skip header row (index 0), parse data rows
    return lines.slice(1).map((line, i) => {
      const cols = parseCSVLine(line);
      // Columns: Timestamp, Brand Name, M1Name, M1ID, M2Name, M2ID, M3Name, M3ID, M4Name, M4ID, M5Name, M5ID
      const members = [];
      for (let m = 0; m < 5; m++) {
        const name = (cols[2 + m*2] || '').trim();
        const sid  = (cols[3 + m*2] || '').trim();
        if (name) members.push({ name, sid });
      }
      return {
        index     : i + 1,
        timestamp : cols[0] || '',
        brand     : (cols[1] || '').trim(),
        members
      };
    }).filter(r => r.brand);
  }

  function parseCSVLine(line) {
    const result = [];
    let cur = '', inQ = false;
    for (let i = 0; i < line.length; i++) {
      const c = line[i];
      if (c === '"') { inQ = !inQ; continue; }
      if (c === ',' && !inQ) { result.push(cur); cur = ''; continue; }
      cur += c;
    }
    result.push(cur);
    return result;
  }

  function renderResults(data) {
    document.getElementById('countBadge').textContent = data.length;
    if (!data.length) {
      document.getElementById('resultsList').innerHTML = `
        <div class="empty-state">
          <div class="big">📭</div>
          <p>No submissions yet.<br/>Be the first to <a href="index.html" style="color:var(--accent)">register your group</a>!</p>
        </div>`;
      return;
    }

    document.getElementById('resultsList').innerHTML = [...data].reverse().map(s => `
      <div class="submission-card" data-search="${(s.brand + ' ' + s.members.map(m=>m.name+' '+m.sid).join(' ')).toLowerCase()}">
        <div class="sc-header">
          <div class="brand-name">
            <span class="brand-dot"></span>
            ${escHtml(s.brand)}
          </div>
          <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
            <span class="group-num">Group ${s.index}</span>
            <span class="sc-time">${formatTime(s.timestamp)}</span>
          </div>
        </div>
        <div class="members-grid">
          ${s.members.map(m => `
            <div class="member-chip">
              <div class="mname">${escHtml(m.name)}</div>
              <div class="msid">${escHtml(m.sid)}</div>
            </div>`).join('')}
        </div>
      </div>`).join('');
  }

  function filterResults() {
    const q = document.getElementById('searchBar').value.toLowerCase();
    const cards = document.querySelectorAll('.submission-card');
    let visible = 0;
    cards.forEach(card => {
      const match = !q || card.dataset.search.includes(q);
      card.style.display = match ? 'block' : 'none';
      if (match) visible++;
    });
    document.getElementById('countBadge').textContent = visible;
  }

  function formatTime(ts) {
    try {
      return new Date(ts).toLocaleString(undefined, { month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' });
    } catch { return ts; }
  }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // Load on page open, then auto-refresh every 60 seconds
  loadData();
  setInterval(loadData, 60000);
</script>
</body>
</html>
